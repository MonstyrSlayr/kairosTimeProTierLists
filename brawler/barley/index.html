<body>
    <div class="bodyLiner">
        <header>
            <a href="../." class="tierListButton">
                <label>< All</label>
            </a>
            <h1>KairosTime Pro Tier List - Barley</h1>
            <a href="../." class="tierListButton antiButton">
                <label>All ></label>
            </a>
        </header>

        <img id="pinReplacementSurgery">

        <div class="epicFuckingGrid">
            <div class="verticallyPrivileged">
                <h2>First Tier List:</h2>
                <span id="replaceWithFirstTierList"></span>
            </div>

            <h2>First Ranking: <span id="firstRanking"></span></h2>

            <div class="verticallyPrivileged">
                <h2>Latest Tier List:</h2>
                <span id="replaceWithRecentTierList"></span>
            </div>

            <h2>Latest Ranking: <span id="mostRecent"></span></h2>
            
            <h2>Most Common Ranking(s): <span id="modeRanking"></span></h2>

            <h2>Average Ranking: <span id="meanRanking"></span></h2>
        </div>

        <div id="kairosOverTimeDivWrapper">
            <canvas id="kairosOverLay" width="200" height="300">

            </canvas>
            <div id="kairosOverTimeDiv">
                <canvas id="kairosOverTime" alt="a graph of this brawler's tiers over time" width="2400" height="300">

                </canvas>
            </div>
        </div>
        <p>* The D Tier was added in v29</p>
        <div id="graphLegend">
            <!-- legend has face and also buffies -->
        </div>
    </div>

    <footer></footer>

    <script src="../template.js" type="module"></script>
