<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="../../style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <title>KairosTime Pro Tier List - Griff</title>
</head>
<body>
    <div class="bodyLiner">
        <header>
            <a href="../." class="tierListButton">
                <label>< All</label>
            </a>
            <h1>KairosTime Pro Tier List - Griff</h1>
            <a href="../." class="tierListButton antiButton">
                <label>All ></label>
            </a>
        </header>

        <img id="pinReplacementSurgery">

        <div class="horizontallyBlessed">
            <div class="verticallyPrivileged">
                <h2>First Tier List:</h2>
                <span id="replaceWithFirstTierList"></span>
            </div>
            <h2>First Ranking: <span id="firstRanking"></span></h2>
        </div>

        <div class="horizontallyBlessed">
            <div class="verticallyPrivileged">
                <h2>Latest Tier List:</h2>
                <span id="replaceWithRecentTierList"></span>
            </div>
            <h2>Latest Ranking: <span id="mostRecent"></span></h2>
        </div>

        <div class="horizontallyBlessed">
            <h2>Most Common Ranking(s): <span id="modeRanking"></span></h2>
        </div>

        <div id="kairosOverTimeDiv">
            <canvas id="kairosOverTime" alt="a graph of this brawler's tiers over time" width="1600" height="300">

            </canvas>
        </div>
    </div>

    <footer></footer>

    <script src="../template.js" type="module"></script>
</body>
</html>
